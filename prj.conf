# Core Matter Configuration
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="src/chip_project_config.h"
CONFIG_CHIP_DEVICE_PRODUCT_NAME="Matter Over Thread Demo"

# Configure ZAP file name
CONFIG_NCS_SAMPLE_MATTER_ZAP_FILE_PATH="${APPLICATION_CONFIG_DIR}/src/default_zap/light_bulb.zap"

# 32773 == 0x8005 (example lighting-app)
CONFIG_CHIP_DEVICE_PRODUCT_ID=32773
CONFIG_STD_CPP17=y

# Commissioning and Pairing Controls
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60

# Hardware Integration (GPIO & PWM for XIAO)
CONFIG_PWM=y
CONFIG_GPIO=y

# Universal Generic Flash Driver Stack
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Enable MCUBoot support to match your pm_static layout
CONFIG_IMG_MANAGER=y

# USB CDC ACM Setup
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

# Advanced Logging Configuration to satisfy dependencies
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BACKEND_UART=y

# Bluetooth Low Energy configuration
CONFIG_BT_DEVICE_NAME="MatterLight"

# Performance and Network Core Settings
CONFIG_THREAD_NAME=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_NCS_SAMPLE_MATTER_TEST_SHELL=n
CONFIG_USE_SEGGER_RTT=n

CONFIG_CHIP_FACTORY_DATA=n
CONFIG_CHIP_FACTORY_DATA_BUILD=n
CONFIG_NFC=n
CONFIG_CHIP_NFC_COMMISSIONING=n
CONFIG_MATTER_NFC_COMMISSIONING=n
CONFIG_NFC_T2T_LIB=n
CONFIG_NFCT_PINS_AS_GPIOS=n
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n
CONFIG_NFC_T2T_NRFXLIB=n
CONFIG_NFC_NDEF=n
CONFIG_NFC_NDEF_MSG=n
CONFIG_NFC_NDEF_RECORD=n
CONFIG_NFC_NDEF_URI_MSG=n
CONFIG_NFC_NDEF_URI_REC=n

# Size Optimizations without breaking structural constraints
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_BOOT_BANNER=n

# Proper NCS v3.3.0 OpenThread optimization variables
CONFIG_OPENTHREAD_DEBUG=n
